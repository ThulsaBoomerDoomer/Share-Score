<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magpies Score Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        :root { --magpie-black: #1a1a1a; --magpie-white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        
        body { background-color: var(--magpie-white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .app-container { 
            width: 90vw; 
            min-height: 100vh; 
            background: var(--magpie-white); 
            padding: 15px 0; 
            display: flex;
            flex-direction: column;
        }

        header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 3px double var(--magpie-black); padding-bottom: 10px; }
        header img { width: 50px; }
        header h1 { font-size: 1.2rem; text-transform: uppercase; }

        .team-block { border: 2px solid var(--magpie-black); border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .team-name { font-size: 1.1rem; font-weight: 900; margin-bottom: 8px; }
        .opponent-input { width: 100%; font-size: 1.1rem; font-weight: 900; border: none; border-bottom: 2px dashed #000; background: transparent; padding: 2px 0 8px 0; margin-bottom: 12px; }

        .inline-score-row { display: grid; grid-template-columns: 1fr 50px 1fr 50px 1fr; align-items: center; gap: 6px; height: 60px; }
        .score-box { border: 2px solid #000; border-radius: 8px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .score-count { font-size: 1.5rem; font-weight: 900; }
        
        .control-buttons { display: flex; flex-direction: column; gap: 2px; height: 60px; }
        .btn-calc { border: 2px solid #000; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-plus { height: 35px; background: #000; color: #fff; font-size: 1.2rem; }
        .btn-minus { height: 23px; background: #fff; color: #000; font-size: 0.9rem; }

        .preview-box { background: #f4f4f4; border: 2px solid #000; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.85rem; margin-bottom: 15px; min-height: 40px; }
        .btn-share { width: 100%; background: var(--magpie-black); color: white; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }
        
        /* Ad pushes to bottom due to flex-grow/auto margin */
        .ad-block { width: 100%; margin-top: auto; display: flex; align-items: center; justify-content: center; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <img src="magpies-logo.png?v=2" alt="Logo">
        <h1>Magpies Tracker</h1>
    </header>

    <div class="team-block">
        <div class="team-name">Busselton Magpies</div>
        <div class="inline-score-row">
            <div class="score-box"><div class="score-count" id="home-goals">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('home', 'goals', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('home', 'goals', -1)">-</button>
            </div>
            <div class="score-box"><div class="score-count" id="home-behinds">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('home', 'behinds', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('home', 'behinds', -1)">-</button>
            </div>
            <div class="score-box" style="background:#000; color:#fff;"><div class="score-count" id="home-total">0</div></div>
        </div>
    </div>

    <div class="team-block">
        <select class="opponent-input" id="away-name" onchange="generatePreviewText()">
            <option value="OPPONENT">-- SELECT OPPONENT --</option>
            <option value="Augusta">AUGUSTA</option>
            <option value="Bunbury">BUNBURY</option>
            <option value="Carey Park">CAREY PARK</option>
            <option value="Collie Lions">COLLIE LIONS</option>
            <option value="Donnybrook">DONNYBROOK</option>
            <option value="Eaton Boomers">EATON BOOMERS</option>
            <option value="HBL">HBL</option>
            <option value="Harvey Bulls">HARVEY BULLS</option>
            <option value="Margaret River">MARGARET RIVER</option>
            <option value="Peninsula Bombers">PENINSULA BOMBERS</option>
            <option value="South Bunbury">SOUTH BUNBURY</option>
        </select>
        <div class="inline-score-row">
            <div class="score-box"><div class="score-count" id="away-goals">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('away', 'goals', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('away', 'goals', -1)">-</button>
            </div>
            <div class="score-box"><div class="score-count" id="away-behinds">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('away', 'behinds', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('away', 'behinds', -1)">-</button>
            </div>
            <div class="score-box" style="background:#000; color:#fff;"><div class="score-count" id="away-total">0</div></div>
        </div>
    </div>

    <div class="preview-box" id="preview-text">...</div>
    <button class="btn-share" onclick="sendUpdate()">Share Score</button>
    
    <div class="ad-block">
        <a href="https://www.nbnco.com.au/connect-home-or-business/check-your-address?utm_source=Poster&utm_medium=Retail&utm_campaign=LAM" target="_blank">
             <img src="nbn-ad.png" style="width: 100%; max-width: 300px; height: auto;">
        </a>
    </div>
</div>

<script>
    const matchData = { home: { goals: 0, behinds: 0 }, away: { goals: 0, behinds: 0 } };
    function updateScore(team, type, amount) {
        matchData[team][type] = Math.max(0, matchData[team][type] + amount);
        document.getElementById(`${team}-${type}`).innerText = matchData[team][type];
        const total = (matchData[team].goals * 6) + matchData[team].behinds;
        document.getElementById(`${team}-total`).innerText = total;
        generatePreviewText();
    }
    function generatePreviewText() {
        const away = document.getElementById('away-name').value;
        const hT = (matchData.home.goals * 6) + matchData.home.behinds;
        const aT = (matchData.away.goals * 6) + matchData.away.behinds;
        const margin = hT - aT;
        let status = margin > 0 ? `Magpies lead by ${margin}` : margin < 0 ? `Magpies trail by ${Math.abs(margin)}` : "Scores level";
        document.getElementById('preview-text').innerText = `${status}\nMagpies ${matchData.home.goals}.${matchData.home.behinds}(${hT}) vs ${away} ${matchData.away.goals}.${matchData.away.behinds}(${aT})`;
    }
    function sendUpdate() {
        const msg = document.getElementById('preview-text').innerText;
        if (navigator.share) navigator.share({text: msg});
        else { navigator.clipboard.writeText(msg); alert("Copied!"); }
    }
</script>
</body>
</html>
