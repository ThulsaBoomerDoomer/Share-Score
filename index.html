<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magpies Score Tracker</title>
    <link rel="icon" href="magpies-logo.png?v=2" type="image/png">
    <link rel="apple-touch-icon" href="magpies-logo.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Score Share">
    
    <style>
        :root {
            --magpie-black: #1a1a1a;
            --magpie-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-user-select: none; user-select: none; }

        body { background-color: #e0e0e0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .app-container { width: 100%; max-width: 460px; background: var(--magpie-white); border: 3px solid var(--magpie-black); border-radius: 16px; padding: 15px; }

        header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; border-bottom: 3px double var(--magpie-black); padding-bottom: 10px; }
        header img { width: 50px; }
        header h1 { font-size: 1.2rem; text-transform: uppercase; }

        .team-block { border: 2px solid var(--magpie-black); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .team-name { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; }
        .opponent-input { width: 100%; font-size: 1.2rem; font-weight: 900; border: none; border-bottom: 2px dashed #000; background: transparent; padding: 5px; }

        .inline-score-row { display: grid; grid-template-columns: 1fr 60px 1fr 60px 1fr; align-items: center; gap: 8px; }
        .score-box { border: 2px solid #000; border-radius: 8px; padding: 10px; text-align: center; }
        .score-count { font-size: 2rem; font-weight: 900; }
        
        /* BIGGER BUTTONS */
        .control-buttons { display: flex; flex-direction: column; gap: 5px; }
        .btn-calc { border: 2px solid #000; width: 55px; height: 55px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .btn-plus { background: #000; color: #fff; }
        .btn-minus { background: #fff; color: #000; }

        .btn-share { width: 100%; background: var(--magpie-black); color: white; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }

        /* AD SPACE */
        .ad-block { width: 100%; height: 100px; background: #eee; border: 2px dashed #999; margin-top: 20px; display: flex; align-items: center; justify-content: center; color: #666; font-style: italic; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <img src="magpies-logo.png?v=2" alt="Logo">
        <h1>Magpies Tracker</h1>
    </header>

    <!-- Home Team -->
    <div class="team-block">
        <div class="team-name">Busselton Magpies</div>
        <div class="inline-score-row">
            <div class="score-box"><div class="score-count" id="home-goals">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('home', 'goals', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('home', 'goals', -1)">-</button>
            </div>
            <div class="score-box"><div class="score-count" id="home-behinds">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('home', 'behinds', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('home', 'behinds', -1)">-</button>
            </div>
            <div class="score-box" style="background:#000; color:#fff;"><div class="score-count" id="home-total">0</div></div>
        </div>
    </div>

    <!-- Away Team -->
    <div class="team-block">
        <select class="opponent-input" id="away-name">
            <option value="OPPONENT">-- SELECT OPPONENT --</option>
            <option value="Augusta">AUGUSTA</option>
            <option value="Bunbury">BUNBURY</option>
            <option value="Carey Park">CAREY PARK</option>
            <option value="Donnybrook">DONNYBROOK</option>
        </select>
        <div class="inline-score-row">
            <div class="score-box"><div class="score-count" id="away-goals">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('away', 'goals', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('away', 'goals', -1)">-</button>
            </div>
            <div class="score-box"><div class="score-count" id="away-behinds">0</div></div>
            <div class="control-buttons">
                <button class="btn-calc btn-plus" onclick="updateScore('away', 'behinds', 1)">+</button>
                <button class="btn-calc btn-minus" onclick="updateScore('away', 'behinds', -1)">-</button>
            </div>
            <div class="score-box" style="background:#000; color:#fff;"><div class="score-count" id="away-total">0</div></div>
        </div>
    </div>

    <button class="btn-share" onclick="sendUpdate()">Share Score</button>

    <!-- AD SPACE -->
    <div class="ad-block">Sponsor Ad Space</div>
</div>

<script>
    const matchData = { home: { goals: 0, behinds: 0 }, away: { goals: 0, behinds: 0 } };
    function updateScore(team, type, amount) {
        matchData[team][type] = Math.max(0, matchData[team][type] + amount);
        document.getElementById(`${team}-${type}`).innerText = matchData[team][type];
        const total = (matchData[team].goals * 6) + matchData[team].behinds;
        document.getElementById(`${team}-total`).innerText = total;
    }
    function sendUpdate() {
        const msg = `Magpies: ${matchData.home.goals}.${matchData.home.behinds} (${(matchData.home.goals * 6) + matchData.home.behinds}) vs Opponent: ${matchData.away.goals}.${matchData.away.behinds} (${(matchData.away.goals * 6) + matchData.away.behinds})`;
        if (navigator.share) navigator.share({text: msg});
        else { navigator.clipboard.writeText(msg); alert("Copied!"); }
    }
</script>
</body>
</html>
